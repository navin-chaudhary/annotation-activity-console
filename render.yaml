# Render Blueprint for the mock server (WebSocket + SSE + REST).
# Vercel can host the Next.js app but not this long-lived WS server, so the
# mock lives here. After deploy, point the Vercel app at it via:
#   NEXT_PUBLIC_API_BASE = https://<this-service>.onrender.com
#   NEXT_PUBLIC_WS_URL   = wss://<this-service>.onrender.com/ws
services:
  - type: web
    name: annotation-console-mock
    runtime: node
    rootDir: mock-server
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/tasks
